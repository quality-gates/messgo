name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install mutago
        run: go install github.com/quality-gates/mutago/v2/cmd/mutago@latest

      - name: Run mutation testing
        # Scoped to packages with unit tests.
        # Enforce quality gates based on messgo's baseline scores (MSI: 40%, Covered MSI: 70%).
        run: |
          mutago \
            --exec-timeout 30 \
            --coverage \
            --min-msi 40 \
            --min-covered-msi 70 \
            github.com/quality-gates/messgo/internal/metrics \
            github.com/quality-gates/messgo/internal/ruleset \
            github.com/quality-gates/messgo/internal/cli \
            github.com/quality-gates/messgo/internal/rules
